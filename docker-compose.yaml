services:
  taskana:
    build:
      context: ${PROJECT_ROOT}
      dockerfile: ${PROJECT_ROOT}/cmd/backend/Dockerfile
    container_name: taskana
    environment:
      - HTTP_ADDR=:8080
      - HTTP_SHUTDOWN_TIMEOUT=${HTTP_SHUTDOWN_TIMEOUT}
      - POSTGRES_HOST=taskana-db
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_TIMEOUT=${POSTGRES_TIMEOUT}
      - LOGGER_LEVEL=${LOGGER_LEVEL}
      - TIME_ZONE=${TIME_ZONE}
      - LOGGER_FOLDER=/app/out/logs
      - JWT_SECRET=${JWT_SECRET}
      - JWT_ACCESS_TTL=${JWT_ACCESS_TTL}
      - JWT_REFRESH_TTL=${JWT_REFRESH_TTL}
    volumes:
      - ${PROJECT_ROOT}/out/logs:/app/out/logs
    ports:
      - "8080:8080"
    depends_on:
      - taskana-db
    restart: always

  taskana-db:
    image: postgres:18-alpine
    container_name: taskana-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - ${PROJECT_ROOT}/out/pgdata:/var/lib/postgresql
    restart: always

  taskana-db-migrate:
    image: migrate/migrate:v4.19.1
    container_name: taskana-migrations
    volumes:
      - ${PROJECT_ROOT}/migrations:/migrations

  taskana-port-forwarder:
    image: alpine/socat:1.8.0.3
    container_name: taskana-port-forwarder
    command: tcp-listen:5432,fork,reuseaddr tcp:taskana-db:5432
    ports:
      - "127.0.0.1:5432:5432"
